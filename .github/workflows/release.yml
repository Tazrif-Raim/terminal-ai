name: Release terminal-ai

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: Deploy dist/site to the VPS after building
        required: true
        default: false
        type: boolean
  push:
    tags:
      - 'v*'
    branches:
      - main

env:
  TERMINAL_AI_BASE_URL: https://terminal-ai.lab-node.me

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Rust toolchain
        shell: pwsh
        run: rustup show

      - name: Test
        shell: pwsh
        run: cargo test --manifest-path .\ai-core\Cargo.toml

      - name: Package static site (Windows)
        shell: pwsh
        run: .\scripts\package-windows.ps1 -BaseUrl $env:TERMINAL_AI_BASE_URL

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-ai-windows
          path: dist/site
          if-no-files-found: error

  build-linux:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        shell: bash
        run: |
          rustup set profile minimal
          rustup update stable
          rustup target add x86_64-unknown-linux-gnu

      - name: Show Rust toolchain
        shell: bash
        run: rustup show

      - name: Test
        shell: bash
        run: cargo test --manifest-path ai-core/Cargo.toml

      - name: Package Linux release
        shell: bash
        env:
          BASE_URL: ${{ env.TERMINAL_AI_BASE_URL }}
        run: bash scripts/package-linux.sh

      - name: Upload Linux artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-ai-linux
          path: dist/site
          if-no-files-found: error

  package-site:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: terminal-ai-windows
          path: windows-site

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: terminal-ai-linux
          path: linux-site

      - name: Merge artifacts and update manifest
        shell: bash
        run: bash scripts/merge-release.sh ./windows-site ./linux-site ./site

      - name: Validate merged site
        shell: bash
        run: |
          MANIFEST_PATH="site/version.json"
          if [ ! -f "$MANIFEST_PATH" ]; then
            echo "version.json not found in merged site." >&2
            exit 1
          fi

          VERSION=$(jq -r '.version' "$MANIFEST_PATH")
          if [ -z "$VERSION" ] || [ "$VERSION" = "null" ]; then
            echo "version missing in version.json." >&2
            exit 1
          fi
          echo "Merged site version: $VERSION"

          # Check all referenced release binaries exist
          for platform in $(jq -r 'keys[] | select(startswith("windows_") or startswith("linux_"))' "$MANIFEST_PATH"); do
            while IFS= read -r asset_name; do
              [ -z "$asset_name" ] && continue
              url=$(jq -r --arg p "$platform" --arg a "$asset_name" '.[$p][$a].url' "$MANIFEST_PATH")
              expected_sha=$(jq -r --arg p "$platform" --arg a "$asset_name" '.[$p][$a].sha256' "$MANIFEST_PATH")
              local_path="site/${url#/}"

              if [ ! -f "$local_path" ]; then
                echo "Missing release binary for $platform/$asset_name: expected at $local_path" >&2
                exit 1
              fi

              actual_sha=$(sha256sum "$local_path" | cut -d' ' -f1)
              if [ "$actual_sha" != "$expected_sha" ]; then
                echo "SHA-256 mismatch for $local_path. Expected $expected_sha, got $actual_sha." >&2
                exit 1
              fi
              echo "  Verified: $platform/$asset_name ($url)"
            done < <(jq -r --arg p "$platform" '.[$p] | keys[]' "$MANIFEST_PATH")
          done
          echo "All release binaries present and checksums verified."

      - name: Upload final site artifact
        uses: actions/upload-artifact@v4
        with:
          name: terminal-ai-site
          path: site
          if-no-files-found: error

  deploy-vps:
    needs: package-site
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || inputs.deploy

    steps:
      - name: Download final site artifact
        uses: actions/download-artifact@v4
        with:
          name: terminal-ai-site
          path: site

      - name: Validate deploy secrets
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          test -n "$VPS_HOST"
          test -n "$VPS_USER"
          test -n "$VPS_SSH_KEY"
          test -n "$VPS_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        env:
          VPS_SSH_KEY: ${{ secrets.VPS_SSH_KEY }}
          VPS_KNOWN_HOSTS: ${{ secrets.VPS_KNOWN_HOSTS }}
        run: |
          install -d -m 700 ~/.ssh
          printf '%s\n' "$VPS_SSH_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$VPS_KNOWN_HOSTS" > ~/.ssh/known_hosts

      - name: Upload to VPS web root
        shell: bash
        env:
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          VPS_PORT: ${{ secrets.VPS_PORT }}
          VPS_WEB_ROOT: ${{ secrets.VPS_WEB_ROOT }}
        run: |
          PORT="${VPS_PORT:-22}"
          WEB_ROOT="${VPS_WEB_ROOT:-/var/www/terminal-ai}"
          tar -czf terminal-ai-site.tgz -C site .
          scp -P "$PORT" terminal-ai-site.tgz "$VPS_USER@$VPS_HOST:/tmp/terminal-ai-site.tgz"
          ssh -p "$PORT" "$VPS_USER@$VPS_HOST" "mkdir -p '$WEB_ROOT' && tar -xzf /tmp/terminal-ai-site.tgz -C '$WEB_ROOT' && rm /tmp/terminal-ai-site.tgz"

      - name: Smoke public files
        shell: bash
        run: |
          BASE="$TERMINAL_AI_BASE_URL"
          curl -fsS "$BASE/version.json" >/dev/null
          curl -fsS "$BASE/powershell.ps1" >/dev/null
          curl -fsS "$BASE/uninstall.ps1" >/dev/null
          curl -fsS "$BASE/install.sh" >/dev/null
          curl -fsS "$BASE/uninstall.sh" >/dev/null

      - name: Smoke release binaries
        shell: bash
        run: |
          BASE="$TERMINAL_AI_BASE_URL"
          manifest="$(curl -fsS "$BASE/version.json")"
          platforms="windows_x64 linux_x64"
          for platform in $platforms; do
            while IFS= read -r url; do
              [ -z "$url" ] && continue
              full="${BASE}${url}"
              echo "Checking: $full"
              curl -fsS "$full" >/dev/null
            done < <(echo "$manifest" | python3 -c "import sys,json;m=json.load(sys.stdin);p=m.get('$platform',{});[print(v['url']) for v in p.values()]")
          done
          echo "All release binaries are reachable."
